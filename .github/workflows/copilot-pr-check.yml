name: Copilot PR Health Check

# Runs on every push to a copilot/* branch (the agent pushes incrementally)
# and when a PR from a copilot/* branch is opened or updated.
# Mirrors the checks in .claude/hooks/stop-check.sh so the agent's output
# is held to the same standard as Claude Code sessions.
on:
  push:
    branches:
      - "copilot/**"
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - "**.md"

jobs:
  health-check:
    name: Project Health Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # needed to post a PR comment on failure

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      - name: TypeScript — type check
        run: bun run typecheck

      - name: Exhaustiveness check
        run: bun run check:exhaustiveness

      # - name: Prettier — format check
      #   run: bunx prettier --check "packages/*/src/**/*.ts"

      - name: ESLint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      # Post a PR comment when any check above fails, so the agent (and
      # human reviewers) can see exactly what broke without reading raw logs.
      - name: Comment on PR if checks failed
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '## ❌ Health check failed',
                '',
                'One or more project health checks failed on this branch. ' +
                'Please review and fix before merging.',
                '',
                `**Checks run:** typecheck · exhaustiveness · prettier · eslint · unit tests`,
                '',
                `[View failed run](${runUrl})`,
              ].join('\n'),
            });
