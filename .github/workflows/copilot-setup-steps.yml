name: Copilot Setup Steps

# Required triggers — do not remove.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Job name must be exactly "copilot-setup-steps" — the agent looks for this name.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # Build all packages in dependency order.
      # TypeScript project references require each package's dist/ to exist
      # before downstream packages can typecheck or run tsc:
      #   core → parser → generator → cli
      # Without this the agent hits "Property X does not exist on type VaspAST"
      # errors immediately when it runs typecheck or tests.
      - name: Build all packages
        run: bun run build

      # Verify the environment is sane before the agent starts.
      # If this fails, the agent starts with a broken baseline which makes
      # it much harder to distinguish its own mistakes from pre-existing issues.
      - name: Typecheck
        run: bun run typecheck

      # - name: Exhaustiveness check
      #   run: bun run check:exhaustiveness

      - name: Unit tests
        run: bun run test
