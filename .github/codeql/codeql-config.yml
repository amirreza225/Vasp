name: "Vasp CodeQL Config"

queries:
  # Default GitHub security suite (XSS, injection, path traversal, etc.)
  - uses: security-extended
  # Vasp-specific exhaustiveness checks
  - uses: ./.github/codeql/queries

paths-ignore:
  - "**/node_modules/**"
  - "**/.bun/**"
  - "**/dist/**"
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "**/*.hbs"
  - "templates/**"
  - "e2e/fixtures/**"
